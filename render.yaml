services:
  - type: web
    name: aria-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_MODEL
        value: claude-sonnet-4-20250514
      - key: FALLBACK_MODE
        value: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
